name: GitHub Daily Report

on:
  schedule:
    - cron: '30 0 * * *'   # 每天 08:30 北京时间（UTC+8 = UTC 00:30）
  workflow_dispatch:         # 允许手动触发

jobs:
  run-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Commit HTML report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ history.json || true
          git diff --staged --quiet || git commit -m "Daily report $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
